server:
  port: 8300
  host: "127.0.0.1"
  cors:
    origins: ["http://localhost:5300"]

dashboard:
  port: 5300
  host: "127.0.0.1"

database:
  path: "./data/cliproxy.db"

auth:
  enabled: true
  admin_token: "${ADMIN_TOKEN}"
  initial_keys:
    - name: "default"
      key: "${PROXY_API_KEY}"

providers:
  claude:
    enabled: true
    cli_path: "claude"
    default_model: "claude-sonnet-4-6"
    max_concurrent: 10
    timeout_ms: 300000
    extra_args:
      - "--no-session-persistence"
      - "--permission-mode"
      - "bypassPermissions"
    # working_dir: "/path/to/project"  # CLI 작업 디렉토리 (기본: 시스템 temp)
    # mode: "sdk"                      # 실행 모드: 'cli' (기본) | 'sdk' (Agent SDK 사용)
    # sdk_options:                     # mode: 'sdk'일 때만 적용
    #   max_turns: 50                  # 최대 에이전트 턴 수
    #   permission_mode: "bypassPermissions"  # 권한 모드
    #   allowed_tools: []              # 자동 승인 도구 목록
    #   disallowed_tools: []           # 차단 도구 목록
    #   max_budget_usd: 1.0            # 요청당 최대 비용 (USD)
    #   session_ttl_ms: 1800000        # 세션 TTL (기본 30분)
    #   enable_session_reuse: true     # 세션 재사용 활성화
    #   persist_session: false         # 디스크 세션 저장
    #
    # mode: "channel-worker"           # 실험적: 실행 중인 Claude Code Channel bridge로 job 제출
    # channel_options:
    #   endpoint_url: "http://127.0.0.1:8788"  # POST /jobs, GET /jobs/:job_id 지원 bridge (managed면 자동 유추)
    #   poll_interval_ms: 500
    #   result_timeout_ms: 300000
    #   isolation: "external"          # bridge 쪽 격리 정책. API 독립성이 필요하면 one-job-per-worker 권장
    #   # --- 내장 bridge 직접 관리 (대시보드 Claude 설정 화면에서 start/stop/restart 가능) ---
    #   managed: true                  # star-cliproxy가 내장 bridge 프로세스를 직접 spawn/supervise
    #   auto_start: true               # 서버 부팅 시 bridge 자동 시작
    #   bridge_port: 8788              # 내장 bridge 리스닝 포트
    #   # bridge_command: "node my-bridge.js"  # 커스텀 bridge 실행 커맨드 (비우면 내장 bridge)

  codex:
    enabled: true
    cli_path: "codex"
    default_model: "gpt-5.5"
    max_concurrent: 10
    timeout_ms: 300000
    extra_args:
      - "--skip-git-repo-check"
      - "--sandbox"
      - "workspace-write"
    cli_options:                     # mode: 'cli'(기본)일 때만 적용
      ephemeral: true                # codex exec --ephemeral 자동 주입 (기본 true)
                                     # ~/.codex/sessions/*.jsonl 누적 차단. false면 기본 동작 유지.
      # enable_session_reuse: false  # codex exec resume <thread_id> 기반 세션 재사용 (기본 false)
                                     # true 시 ephemeral은 강제 false로 전환되고 세션 jsonl이 디스크에 누적됨.
                                     # clientKey(X-Cliproxy-Session-Id 헤더 또는 API 키)별로 thread 1개 자동 유지.
      # session_ttl_ms: 1800000      # 세션 TTL (기본 30분). enable_session_reuse=true일 때만 유효.
    # working_dir: "/path/to/project"
    # mode: "app-server"              # 실행 모드: 'cli' (기본) | 'app-server' (persistent JSON-RPC)
    # app_server_options:             # mode: 'app-server'일 때만 적용
    #   transport: "stdio"            # 전송 방식: 'stdio' (기본) | 'websocket' (실험적)
    #   session_ttl_ms: 1800000       # 스레드 재사용 TTL (기본 30분)
    #   enable_session_reuse: true    # 스레드 재사용 활성화
    #   max_turns: 10                 # 턴 제한
    #   auto_restart: true            # 크래시 시 자동 재시작
    #   max_restart_count: 5          # 최대 재시작 횟수

  copilot:
    enabled: true
    cli_path: "copilot"
    default_model: "claude-sonnet-4-6"
    max_concurrent: 10
    timeout_ms: 300000
    extra_args:
      - "--deny-tool=shell"
      - "--deny-tool=write"
    # working_dir: "/path/to/project"
    # 인증: COPILOT_GITHUB_TOKEN 환경변수 또는 사전 `copilot` OAuth 로그인 필요

  # Gemini CLI (gemini) — DEPRECATED / 단종.
  # Google이 Gemini CLI를 단종하고 Antigravity CLI(agy)로 대체했습니다(아래 agy 참고).
  # gemini provider 코드는 유지되어 있으므로, Gemini CLI가 다시 제공되면
  # enabled: true + cli_path 지정만으로 복구할 수 있습니다.
  # 빌트인이라 블록을 통째로 지우면 기본값으로 다시 enabled되므로 enabled: false로 명시합니다.
  gemini:
    enabled: false
    # cli_path: "gemini"
    # default_model: "gemini-2.5-pro"
    # max_concurrent: 10
    # timeout_ms: 300000
    # extra_args:
    #   - "--yolo"                       # tool 자동 승인 (headless 모드 필수)
    #   - "--skip-trust"                 # headless 실행 시 trusted folder 프롬프트 방지
    # working_dir: "/path/to/project"    # 에이전틱 파일 작업 시 필수

  # Google Antigravity CLI (agy) — 2026-05-19 Google I/O 2026 발표, 1.0.0 기준.
  # Gemini CLI의 후계자로 Google이 이전 권장. AI Pro/Ultra 구독 + 사전 Google OAuth 로그인 필요
  # (시스템 키체인 저장; SSH 세션은 인가 URL 안내). 설치: curl -fsSL https://antigravity.google/cli/install.sh | bash
  #
  # 1.0.0 한계 (구현 시 반영됨):
  #   - -m/--model 미지원 → 매핑된 actual_model은 응답 메타데이터 표시용으로만 사용.
  #     agy 자체 백엔드가 모델 선택(특정 Gemini 모델 강제 불가).
  #   - --json/--stream-json 미지원 → 출력은 plain text. 토큰 사용량은 추정값(estimateTokens).
  #   - 명시적 스트리밍 없음 → 단일-청크 가짜 스트리밍으로 wrap(클라이언트 호환 유지).
  #   - 세션 연속성은 매 호출 신규(messages 전체를 매번 prompt로 직렬화).
  agy:
    enabled: true
    cli_path: "agy"
    default_model: "antigravity"        # 표시용. 실제 모델은 agy 백엔드가 결정.
    max_concurrent: 5                   # AI Pro 쿼터 보호를 위해 보수적 기본값
    timeout_ms: 300000
    extra_args: []
    # 옵션 (사용자 옵트인 — 보안/안정성 영향 큰 플래그):
    # extra_args:
    #   - "--dangerously-skip-permissions"  # 툴 자동 승인 (무인 프록시 운영 시 필수)
    #                                       # 주의: prompt 내 악성 지시가 working_dir 범위 안에서 실행될 수 있음
    #   - "--sandbox"                       # 터미널 제한 샌드박스 (격리 범위는 agy 1.0.0 문서 기준 불명확)
    # working_dir: "/path/to/safe-workspace"  # 파일 시스템 격리 권장 (--dangerously-skip-permissions 사용 시 필수)

  # xAI Grok Build CLI (grok, "Grok Build TUI") — 2026-05-20 발표.
  # SuperGrok / X Premium+ 구독 + 사전 로그인 필요 (grok login). 설치 후 `grok models`로 모델 확인.
  # 헤드리스 단발 실행: grok -m <model> -p "<prompt>" → stdout plain text.
  #
  # 동작 (구현 시 반영됨):
  #   - -m/--model 지원 → 매핑된 actual_model을 실제로 전달. 현재 `grok models`는 grok-build 1종(default) 노출.
  #   - 출력은 plain text(stdout). 토큰 사용량은 추정값(estimateTokens).
  #   - 단일-청크 가짜 스트리밍으로 wrap(클라이언트 호환 유지). --reasoning-effort는 미배선(매핑에서 무시).
  #   - 세션 연속성은 매 호출 신규(messages 전체를 매번 prompt로 직렬화).
  grok:
    enabled: true
    cli_path: "grok"
    default_model: "grok-build"         # `grok models`의 기본·최신 모델
    max_concurrent: 5                   # 구독 쿼터 보호를 위해 보수적 기본값
    timeout_ms: 300000
    extra_args: []
    # 옵션 (사용자 옵트인 — 보안/안정성 영향 큰 플래그):
    # extra_args:
    #   - "--always-approve"                # 툴 자동 승인 (무인 프록시 운영 시)
    #                                       # 주의: prompt 내 악성 지시가 working_dir 범위 안에서 실행될 수 있음
    # working_dir: "/path/to/safe-workspace"  # 파일 시스템 격리 권장 (--always-approve 사용 시 권장)

# 플러그인: 커스텀 프로바이더를 코드 수정 없이 추가
# plugins/ 디렉토리에 플러그인을 만들고 여기에 등록
# 자세한 가이드: plugins/README.md, 예제: plugins/example-plugin/
plugins: []
  # - path: "./plugins/example-plugin"
  #   config:
  #     cli_path: "/usr/local/bin/my-cli"
  #     default_model: "my-model"
  #     max_concurrent: 10
  #     timeout_ms: 120000

rate_limits:
  global:
    rpm: 60
    rpd: 1000
  per_provider:
    claude:
      rpm: 20
    codex:
      rpm: 20
    copilot:
      rpm: 20
    agy:
      rpm: 20
    grok:
      rpm: 20

cache:
  enabled: true
  ttl_seconds: 3600
  max_entries: 1000

validation:
  max_message_count: 800         # 메시지 배열 최대 수
  max_message_length: 250000     # 개별 메시지 최대 길이 (~62K tokens)
  max_prompt_length: 1000000     # 전체 프롬프트 총 길이 (~250K tokens)
  max_response_length: 300000    # CLI 응답 최대 길이 (~75K tokens)
  body_limit_bytes: 16777216     # HTTP 요청 본문 최대 크기 (16MB, 변경 후 재시작 필요)

model_mappings:
  # reasoning_effort 필드 (선택):
  #   low | medium | high | xhigh | max
  #   - Claude  : --effort <level>           (low/medium/high/xhigh/max 지원)
  #   - Codex   : -c model_reasoning_effort  (low/medium/high 지원, xhigh/max는 high로 폴백)
  #   - Copilot : --effort <level>           (low/medium/high/xhigh 지원, max는 xhigh로 폴백)
  #   - Gemini  : 미지원 (필드 무시)
  # 생략하면 각 CLI의 기본 동작을 따른다. CLI 모드에서만 적용 (App Server / SDK 모드 제외).
  #
  # provider_overrides 필드 (선택, provider별 화이트리스트 기반):
  #   동일 프로바이더를 공유하는 매핑마다 옵션을 다르게 적용. 화이트리스트 키만 허용.
  #   허용: extra_args, timeout_ms, working_dir, cli_options.{ephemeral, enable_session_reuse, session_ttl_ms}
  #   금지: cli_path, enabled, default_model, max_concurrent, app_server_options
  #   예시:
  #     provider_overrides:
  #       cli_options:
  #         enable_session_reuse: true   # 이 매핑만 세션 재사용
  #         session_ttl_ms: 3600000      # 1시간 TTL
  #       extra_args: ["--skip-git-repo-check"]  # 기본 extra_args를 교체 (-s 정책은 첫 호출에만 적용됨)
  #   Claude도 mode/channel_options override를 지원한다:
  #     provider_overrides:
  #       mode: "channel-worker"
  #       channel_options:
  #         endpoint_url: "http://127.0.0.1:8788"
  #         isolation: "external"

  # 초기 시드 매핑 — 프로바이더당 최대 2개. 필요하면 대시보드 Models 페이지에서 추가/수정.
  # reasoning_effort, provider_overrides 등 고급 옵션은 별칭을 복제해서 직접 만들면 된다.

  # Claude models
  - alias: "claude-sonnet"
    provider: "claude"
    actual_model: "claude-sonnet-4-6"
  - alias: "claude-haiku"
    provider: "claude"
    actual_model: "claude-haiku-4-5-20251001"
  # Codex/OpenAI models
  - alias: "gpt-5.5"
    provider: "codex"
    actual_model: "gpt-5.5"
  - alias: "gpt-5.4-mini"
    provider: "codex"
    actual_model: "gpt-5.4-mini"
  # Copilot models
  - alias: "copilot-sonnet"
    provider: "copilot"
    actual_model: "claude-sonnet-4-6"
  - alias: "copilot-gpt"
    provider: "copilot"
    actual_model: "gpt-5.4"
  # Gemini CLI는 단종됨(agy로 대체) → gemini-pro/gemini-flash 매핑 제거.
  # gemini provider를 다시 켜면 여기에 매핑을 추가하세요.
  # Antigravity (agy) — 1.0.0은 모델 플래그 없음. actual_model은 표시용.
  - alias: "antigravity"
    provider: "agy"
    actual_model: "antigravity"

  # xAI Grok Build — 최신 단일 모델 (grok models의 기본값)
  - alias: "grok-build"
    provider: "grok"
    actual_model: "grok-build"
